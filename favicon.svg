<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#0f172a"/>
  <!-- Bar chart bars -->
  <rect x="14" y="55" width="14" height="30" rx="2" fill="#3b82f6"/>
  <rect x="32" y="38" width="14" height="47" rx="2" fill="#3b82f6"/>
  <!-- Gap (empty bar) -->
  <rect x="50" y="30" width="14" height="55" rx="2" fill="#1e3a5f" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="68" y="45" width="14" height="40" rx="2" fill="#3b82f6"/>
  <!-- Gap label arrow -->
  <text x="46" y="26" font-family="sans-serif" font-size="11" fill="#ef4444" font-weight="bold">GAP</text>
  <!-- Baseline -->
  <line x1="10" y1="85" x2="90" y2="85" stroke="#475569" stroke-width="2"/>
</svg>
